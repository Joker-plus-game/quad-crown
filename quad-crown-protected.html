<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Quad Crown | Casino Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--bg:#06060e;--bg2:#0d0d1c;--bg3:#141424;--gold:#c9a84c;--goldl:#f0d870;--goldd:#7a5a10;--silv:#9daab5;--brnz:#c8843a;--felt:#07200f;--feltb:#12402a;--tx:#e0d8c8;--tx2:#686080;--red:#e04848;--grn:#38b060}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,rgba(201,168,76,.04) 25%,transparent 25%) -20px 0,linear-gradient(225deg,rgba(201,168,76,.04) 25%,transparent 25%) -20px 0,linear-gradient(315deg,rgba(201,168,76,.04) 25%,transparent 25%),linear-gradient(45deg,rgba(201,168,76,.04) 25%,transparent 25%);background-size:40px 40px;background-color:var(--bg);pointer-events:none}
#app{position:relative;z-index:1;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.55)}70%{transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.7))}50%{filter:drop-shadow(0 0 24px rgba(201,168,76,1))}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.5)}50%{box-shadow:0 0 0 12px rgba(201,168,76,0)}}
@keyframes confettiDrop{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes botDots{0%,80%,100%{opacity:.3}40%{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes convPop{0%{opacity:0;transform:scale(.6)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes timerBar{from{width:100%}to{width:0%}}
.screen{min-height:100vh;display:flex;flex-direction:column;max-width:820px;margin:0 auto}
/* MENU */
.menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:30px;animation:fadeUp .6s ease}
.logo-orn{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:10px}
.orn-l{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}.orn-l.r{background:linear-gradient(90deg,var(--gold),transparent)}
.orn-d{width:9px;height:9px;background:var(--gold);transform:rotate(45deg)}
.logo-main{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(40px,10vw,76px);letter-spacing:8px;line-height:1;background:linear-gradient(180deg,#f8e880 0%,#c9a84c 40%,#8a6010 70%,#c9a84c 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}
.logo-sub{font-size:11px;letter-spacing:8px;color:var(--tx2);text-transform:uppercase;margin-top:8px}
.deco{display:flex;align-items:center;gap:10px;width:100%;max-width:320px}
.deco-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent)}
.deco-d{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);opacity:.6}
.menu-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px}
.sess-bar{display:flex;gap:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:12px 18px;width:100%;max-width:360px;justify-content:space-around}
.sess-it{display:flex;flex-direction:column;align-items:center;gap:2px}
.sess-l{font-size:9px;letter-spacing:3px;color:var(--tx2);text-transform:uppercase}
.sess-v{font-family:'Cinzel',serif;font-size:16px;font-weight:700}
.rules-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:20px 22px;width:100%;max-width:360px}
.rules-hd{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;text-align:center}
.r-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px}
.r-row:last-child{border:none}.r-k{color:var(--tx2)}.r-v{font-weight:700}
.c-b{color:var(--brnz)}.c-s{color:var(--silv)}.c-g{color:var(--gold)}
.vtag{font-size:10px;letter-spacing:4px;color:rgba(201,168,76,.3);text-transform:uppercase;padding:6px 16px;border:1px solid rgba(201,168,76,.1);border-radius:2px}
/* BUTTONS */
.btn-gold{padding:16px 28px;border:none;border-radius:3px;cursor:pointer;background:linear-gradient(135deg,#7a5a10,#c9a84c 50%,#7a5a10);background-size:200% 100%;font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:4px;color:#080810;text-transform:uppercase;transition:all .3s}
.btn-gold:hover{background-position:100% 0;transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.38)}
.btn-gold:disabled{opacity:.4;cursor:default;transform:none}
.btn-out{padding:14px 28px;background:transparent;cursor:pointer;border:1px solid rgba(201,168,76,.35);border-radius:3px;font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:4px;color:rgba(201,168,76,.7);text-transform:uppercase;transition:all .3s}
.btn-out:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06);transform:translateY(-2px)}
.btn-sm{padding:7px 14px;background:transparent;border:1px solid rgba(201,168,76,.2);border-radius:3px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:rgba(201,168,76,.5);text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.back-btn{background:none;border:none;color:var(--tx2);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;cursor:pointer;padding:6px;text-transform:uppercase;transition:color .2s}
.back-btn:hover{color:var(--gold)}
.btn-skip{padding:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:2px;color:var(--tx2);text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%}
.btn-skip:hover{border-color:rgba(201,168,76,.3);color:var(--gold)}
.btn-roll{width:100%;padding:16px;background:linear-gradient(135deg,#164a28,#24844a);border:none;border-radius:5px;font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase;cursor:pointer;transition:all .3s}
.btn-roll:hover:not(:disabled){background:linear-gradient(135deg,#1e6030,#30a060);transform:translateY(-2px);box-shadow:0 8px 24px rgba(36,132,74,.4)}
.btn-roll:disabled{opacity:.4;cursor:default;transform:none}
/* SETUP */
.setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:22px;animation:fadeUp .4s ease}
.setup-hd{font-family:'Cinzel',serif;font-size:21px;font-weight:700;color:var(--gold);letter-spacing:4px;text-align:center}
.setup-card{background:var(--bg3);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:26px 22px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:22px}
.fg{display:flex;flex-direction:column;gap:9px}
.fg-lbl{font-size:10px;letter-spacing:4px;color:var(--tx2);text-transform:uppercase}
.opt-row{display:flex;gap:8px}
.opt-btn{flex:1;padding:11px;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:4px;color:var(--tx2);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.opt-btn.on{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.opt-btn:hover:not(.on){border-color:rgba(201,168,76,.3);color:var(--tx)}
.bet-disp{background:var(--bg2);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:13px;text-align:center;font-family:'Cinzel',serif;font-size:26px;color:var(--gold)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip-btn{padding:7px 12px;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:4px;color:var(--tx2);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.chip-btn:hover{border-color:var(--gold);color:var(--gold)}
.setup-info{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.14);border-radius:4px;padding:11px 14px;font-size:13px;color:rgba(201,168,76,.6);line-height:1.8}
/* GAME HEADER */
.g-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:var(--bg2);border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.g-logo{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:4px}
.g-pot-w{text-align:center}
.g-pot-l{font-size:9px;letter-spacing:3px;color:var(--tx2);text-transform:uppercase}
.g-pot-v{font-family:'Cinzel',serif;font-size:21px;color:var(--gold);font-weight:700;line-height:1.1}
.g-info{display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-size:11px;color:var(--tx2)}
.mode-tog{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.mode-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 5px var(--grn)}
.mode-dot.real{background:var(--gold);box-shadow:0 0 5px var(--gold)}
/* TIMER */
.timer-track{height:3px;background:rgba(255,255,255,.06);flex-shrink:0}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--goldd),var(--gold))}
/* PLAYER TABS */
.p-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.05);overflow-x:auto;flex-shrink:0}
.p-tab{flex:1;min-width:90px;padding:8px 10px;border-right:1px solid rgba(255,255,255,.04);transition:all .3s;position:relative;cursor:default}
.p-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .3s}
.p-tab.cur::after{transform:scaleX(1)}.p-tab.cur{background:rgba(201,168,76,.06)}
.p-tab-n{font-size:11px;font-weight:600;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx2)}
.p-tab.cur .p-tab-n{color:var(--gold)}
.p-tab-t{display:flex;gap:6px;margin-top:4px;font-size:11px}
.badge{font-size:8px;letter-spacing:1px;background:rgba(255,255,255,.05);border-radius:2px;padding:1px 4px;display:inline-block}
/* TOKEN BAR */
.tkn-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:9px 14px;background:var(--bg3);flex-wrap:wrap;flex-shrink:0;position:relative}
.tkn-st{display:flex;flex-direction:column;align-items:center;gap:4px}
.tkn-lbl{font-size:9px;letter-spacing:3px;color:var(--tx2);text-transform:uppercase}
.tkn-dots{display:flex;gap:4px}
.td{width:15px;height:15px;border-radius:50%;border:2px solid;transition:all .4s;flex-shrink:0}
.td.b{border-color:var(--brnz);background:transparent}.td.b.on{background:radial-gradient(circle at 35% 35%,#d49050,#8a4010);box-shadow:0 0 8px rgba(200,132,58,.8)}
.td.s{border-color:var(--silv);background:transparent}.td.s.on{background:radial-gradient(circle at 35% 35%,#e0e8f0,#607888);box-shadow:0 0 8px rgba(157,170,181,.8)}
.td.g{width:20px;height:20px;border-color:var(--gold);background:transparent}.td.g.on{background:radial-gradient(circle at 35% 35%,#f8e880,#7a5010);box-shadow:0 0 14px rgba(201,168,76,1);animation:pulse 1.5s infinite}
.tkn-arr{color:var(--tx2);font-size:12px}
.conv-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,8,20,.92);border:1px solid var(--gold);border-radius:6px;padding:6px 14px;font-family:'Cinzel',serif;font-size:13px;color:var(--gold);white-space:nowrap;animation:convPop .4s ease;z-index:10;pointer-events:none}
/* FELT */
.felt{background:radial-gradient(ellipse at 50% 40%,#0b2c18 0%,#041008 100%);border:3px solid var(--feltb);border-radius:14px;margin:10px 12px;display:flex;flex-direction:column;align-items:center;gap:14px;flex:1;min-height:240px;position:relative;overflow:hidden;padding:16px}
.felt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.006) 18px,rgba(255,255,255,.006) 19px),repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.003) 18px,rgba(255,255,255,.003) 19px);pointer-events:none}
#dice-mount{width:100%;position:relative;z-index:1}
#dice-mount canvas{display:block;border-radius:10px}
/* RESULT */
.res-pop{text-align:center;z-index:1;position:relative;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.res-type{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:2px}
.res-sub{font-size:13px;color:var(--tx2);margin-top:4px;letter-spacing:1px}
.felt-idle{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;color:rgba(20,60,35,.9);z-index:1;position:relative}
.bot-thinking{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:rgba(201,168,76,.5);z-index:1;position:relative;display:flex;align-items:center;gap:6px}
.bt-d span{animation:botDots .8s ease-in-out infinite;font-size:16px}
.bt-d span:nth-child(2){animation-delay:.15s}.bt-d span:nth-child(3){animation-delay:.3s}
/* ADVANCE BAR */
.adv-bar{height:3px;background:rgba(255,255,255,.06);margin:0 12px;border-radius:2px;overflow:hidden;flex-shrink:0}
.adv-fill{height:100%;background:linear-gradient(90deg,var(--goldd),var(--gold));border-radius:2px}
/* CONTROLS */
.g-ctrl{padding:12px 14px 16px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.turn-lbl{text-align:center;font-size:11px;letter-spacing:2px;color:var(--tx2);text-transform:uppercase}
.turn-name{color:var(--gold);font-weight:700}
/* LOG */
.game-log{padding:6px 12px;display:flex;gap:5px;overflow-x:auto;min-height:28px;flex-shrink:0}
.log-item{font-size:10px;letter-spacing:1px;color:var(--tx2);white-space:nowrap;background:var(--bg3);border-radius:3px;padding:2px 7px;border:1px solid rgba(255,255,255,.04);flex-shrink:0}
/* WIN OVERLAY */
.win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:99;animation:fadeUp .3s ease}
.win-box{background:var(--bg3);border:2px solid rgba(201,168,76,.5);border-radius:12px;padding:44px 34px;text-align:center;max-width:380px;width:90%;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.win-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.14),transparent 60%);pointer-events:none}
.win-trophy{font-size:60px;margin-bottom:12px;animation:glow 2s infinite;display:block}
.win-name{font-family:'Cinzel',serif;font-size:28px;font-weight:900;background:linear-gradient(180deg,#f8e880,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.win-tag{font-size:11px;letter-spacing:5px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase}
.win-prize{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);margin-bottom:24px}
.win-btns{display:flex;flex-direction:column;gap:10px}
/* SOLO */
.chal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:400px){.chal-grid{grid-template-columns:1fr}}
.chal-card{background:var(--bg3);border:2px solid rgba(255,255,255,.08);border-radius:8px;padding:14px 8px;cursor:pointer;text-align:center;transition:all .25s;position:relative}
.chal-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-2px)}
.chal-card.sel{border-color:var(--gold);background:rgba(201,168,76,.1)}
.chal-card.sel::after{content:'v';position:absolute;top:6px;right:8px;color:var(--gold);font-size:12px;font-weight:700}
.chal-rolls{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:var(--tx);margin-bottom:3px}
.chal-payout{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--gold)}
.chal-prob{font-size:11px;color:var(--tx2);margin-top:3px}
.chal-risk{font-size:9px;font-weight:700;letter-spacing:2px;margin-top:5px;padding:2px 7px;border-radius:2px;display:inline-block}
.solo-prog{padding:9px 14px;background:var(--bg3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.prog-label{font-size:10px;letter-spacing:2px;color:var(--tx2);text-transform:uppercase;white-space:nowrap}
.prog-bar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--goldd),var(--gold));border-radius:3px;transition:width .4s ease}
.prog-count{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);white-space:nowrap}
.bet-panel{padding:12px 14px 18px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.bp-lbl{font-size:10px;letter-spacing:4px;color:var(--tx2);text-transform:uppercase}
.amt-row{display:flex;align-items:center;gap:8px}
.amt-lbl{font-size:10px;letter-spacing:3px;color:var(--tx2);text-transform:uppercase;white-space:nowrap}
.amt-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.amt-chip{padding:4px 9px;background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:3px;color:var(--tx2);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.amt-chip:hover{border-color:var(--gold);color:var(--gold)}.amt-chip.on{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.pot-win{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:4px;padding:8px 12px;text-align:center;font-size:12px;color:rgba(201,168,76,.6)}
.pot-win strong{color:var(--gold)}
.refill-btn{display:flex;align-items:center;gap:6px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:3px;color:var(--gold);padding:5px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.refill-btn:hover{background:rgba(201,168,76,.15);border-color:var(--gold)}
.toast{margin:0 12px;padding:10px 14px;border-radius:5px;text-align:center;font-family:'Cinzel',serif;font-size:15px;font-weight:700;animation:toastIn .3s ease;flex-shrink:0}
.toast.w{background:rgba(56,176,96,.15);border:1px solid rgba(56,176,96,.4);color:var(--grn)}
.toast.l{background:rgba(224,72,72,.12);border:1px solid rgba(224,72,72,.3);color:var(--red)}
/* PAYTABLE MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:98;animation:fadeUp .2s ease}
.modal-box{background:var(--bg3);border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:24px 20px;max-width:440px;width:92%;max-height:80vh;overflow-y:auto}
.modal-hd{font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--tx2);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--gold)}
table.pt{width:100%;border-collapse:collapse;font-size:13px}
table.pt th{text-align:left;padding:7px 8px;font-size:9px;letter-spacing:3px;color:var(--tx2);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.08)}
table.pt td{padding:8px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
table.pt tr:last-child td{border:none}
/* INFO */
.info-screen{min-height:100vh;display:flex;flex-direction:column;max-width:820px;margin:0 auto;padding:22px 18px;gap:18px;animation:fadeUp .4s ease}
.info-section{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:20px}
.info-hd{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.info-row:last-child{border:none}.info-k{color:var(--tx2)}.info-v{font-weight:700}
.rg-footer{text-align:center;padding:14px;font-size:10px;color:rgba(100,100,120,.5);letter-spacing:1px;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0}
</style>
